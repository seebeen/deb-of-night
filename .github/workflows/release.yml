name: Release and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-pages
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TOKEN: ${{ secrets.OBLAKBOT_PAT || github.token }}
      RELEASE_GPG_PRIVATE_KEY: ${{ secrets.OBLAKBOT_GPG_KEY || secrets.GPG_PRIVATE_KEY }}
      RELEASE_GPG_PASSPHRASE: ${{ secrets.OBLAKBOT_GPG_PASS || secrets.GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ env.RELEASE_TOKEN }}

      - name: Import GPG key
        if: ${{ env.RELEASE_GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v7
        id: gpg
        with:
          gpg_private_key: ${{ env.RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ env.RELEASE_GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install media tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify registry signatures
        run: npm audit signatures

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GIT_AUTHOR_NAME: ${{ steps.gpg.outputs.name || 'github-actions[bot]' }}
          GIT_AUTHOR_EMAIL: ${{ steps.gpg.outputs.email || '41898282+github-actions[bot]@users.noreply.github.com' }}
          GIT_COMMITTER_NAME: ${{ steps.gpg.outputs.name || 'github-actions[bot]' }}
          GIT_COMMITTER_EMAIL: ${{ steps.gpg.outputs.email || '41898282+github-actions[bot]@users.noreply.github.com' }}
          GITHUB_TOKEN: ${{ env.RELEASE_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
